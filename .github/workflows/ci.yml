name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy rag

      - name: Bandit
        run: uv run bandit -r rag

      - name: Pytest
        run: uv run pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: rag-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name rag-smoke -p 8766:8766 rag-server:ci
          trap 'docker logs rag-smoke; docker rm -f rag-smoke' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8766/healthz > /dev/null 2>&1; then
              echo "Healthy after $((i * 2)) seconds"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for /healthz" >&2
          exit 1
